<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lexie PTT prototype</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 1rem auto; padding: 0.5rem; }
    button { font-size: 1.1rem; padding: 0.5rem 1rem; }
    .hint { color: #555; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Push-to-talk (browser)</h1>
  <p class="hint">Use <strong>localhost</strong> or <strong>HTTPS</strong> so the mic works (SPEC §6). On Fly, open this page from the same host (e.g. <code>/prototype/</code> on <code>lexie-server.fly.dev</code>)—same-origin, no extra CORS. Set device key to match server <code>LEXIE_DEVICE_KEY</code> (header only, never in the URL).</p>
  <label>Device key <input id="dk" type="password" style="width:100%;" /></label>
  <p><button id="rec" type="button">Hold to talk</button></p>
  <p id="st"></p>
  <audio id="out" controls style="width:100%"></audio>
  <script>
    const base = location.origin;
    const k = "lexie_device_bearer";
    /** SPEC §5.1 — child-adjacent copy (wire code → display string). */
    const CHILD_ERROR_LINE = {
      unauthorized: "We couldn’t connect. Ask a grown-up to check the bookmark.",
      audio_too_short: "That was a little too short. Try the button again.",
      audio_too_long: "That was a little too long. Say one word, then let go.",
      transcription_empty: "I didn’t catch that. Try again, a little closer.",
      unintelligible_audio: "I didn’t quite hear that. Try again.",
      payload_too_large: "That recording is too big. Try a shorter try.",
      openai_unavailable: "Lexie is taking a break. Try again in a little bit.",
      rate_limited: "Too many tries. Wait a little, then try again.",
      internal: "Something went wrong. Try again, or ask a grown-up.",
      explanation_invalid: "I couldn’t get that one ready. Try asking again, a little bit slower.",
    };
    function wireErrorFromJson(j) {
      if (!j || typeof j !== "object") return null;
      if (typeof j.error === "string") return j.error;
      const d = j.detail;
      if (d && typeof d === "object" && typeof d.error === "string") return d.error;
      return null;
    }
    function childLineForError(code) {
      if (code && CHILD_ERROR_LINE[code]) return CHILD_ERROR_LINE[code];
      return "Something went wrong. Try again, or ask a grown-up.";
    }
    if (sessionStorage.getItem(k)) document.getElementById("dk").value = sessionStorage.getItem(k);
    let m = null, chunks = [];
    const st = (t) => { document.getElementById("st").textContent = t; };
    const rec = document.getElementById("rec");
    rec.onmousedown = rec.ontouchstart = async (e) => { e.preventDefault(); await start(); };
    rec.onmouseup = rec.onmouseleave = rec.ontouchend = () => stop();
    async function start() {
      chunks = [];
      m = new MediaRecorder(await navigator.mediaDevices.getUserMedia({ audio: true }), { mimeType: "audio/webm" });
      m.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
      m.start();
      st("Recording…");
    }
    async function stop() {
      if (!m || m.state === "inactive") return;
      await new Promise((r) => { m.onstop = r; m.stop(); });
      st("Sending…");
      const blob = new Blob(chunks, { type: "audio/webm" });
      const fd = new FormData();
      fd.append("audio", blob, "rec.webm");
      const t = document.getElementById("dk").value.trim();
      if (t) sessionStorage.setItem(k, t);
      const headers = {};
      if (t) headers["Authorization"] = "Bearer " + t;
      const res = await fetch(base + "/explain", { method: "POST", body: fd, headers });
      if (!res.ok) {
        let childLine = childLineForError(null);
        try {
          const j = await res.json();
          const wire = wireErrorFromJson(j);
          if (wire) childLine = childLineForError(wire);
        } catch (e) { /* ignore */ }
        st(childLine + " (" + res.status + ")");
        return;
      }
      const ms = res.headers.get("X-Explain-Latency-Ms");
      const b = await res.blob();
      document.getElementById("out").src = URL.createObjectURL(b);
      st(ms ? "Play below. (" + ms + " ms)" : "Play below.");
    }
  </script>
</body>
</html>
