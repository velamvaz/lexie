# Runs contract tests for lexie-server (WX-013 preflight; Python 3.11+).
name: lexie-server pytest

on:
  push:
    branches: [main]
    paths:
      - "lexie-server/**"
      - ".github/workflows/lexie-server-pytest.yml"
  pull_request:
    paths:
      - "lexie-server/**"
      - ".github/workflows/lexie-server-pytest.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lexie-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and run tests
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest -v
